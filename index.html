<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio 🎵</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0510;
      color: #ffd0d0;
      font-family: 'Playfair Display', serif;
      padding: 16px;
    }

    .box {
      width: 100%;
      max-width: 420px;
      text-align: center;
      background: rgba(30,10,20,0.92);
      padding: clamp(20px, 5vw, 32px);
      border-radius: 18px;
      border: 1px solid rgba(255,100,130,0.4);
      box-shadow: 0 0 30px rgba(200,60,80,0.25);
    }

    h2 {
      margin: 0 0 20px;
      font-size: clamp(18px, 5vw, 24px);
      letter-spacing: 0.05em;
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      background: rgba(120,20,40,0.6);
      color: white;
      font-size: clamp(14px, 4vw, 16px);
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
    }

    button:active {
      transform: scale(0.95);
      background: rgba(170,35,65,0.8);
    }

    @media (max-width: 360px) {
      .buttons {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<div class="box">
  <h2>¿Quieres música? 🎵</h2>

  <div class="buttons">
    <button onclick="go(true)">Sí</button>
    <button onclick="go(false)">No</button>
  </div>
</div>

<script>
function go(withMusic) {
  localStorage.setItem('music', withMusic ? 'yes' : 'no');
  window.location.href = "flor.html";
}
</script>

</body>
</html>
